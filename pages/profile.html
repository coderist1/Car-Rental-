<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile — CarRental</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/profile.css">
</head>
<body>

<div class="profile-container">

  
  <div class="profile-header">
    <button class="back-button" id="backBtn">
      <span class="back-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5"/><path d="m12 19-7-7 7-7"/>
        </svg>
      </span>
      <span>Back</span>
    </button>
    <div class="header-title-group">
      <h1 class="profile-title">Edit Profile</h1>
      <p class="profile-subtitle">Account Settings</p>
    </div>
    <div class="header-spacer"></div>
  </div>

  
  <div class="profile-content">

    
    <div class="profile-picture-section">
      <div class="profile-picture-container">
        <div class="profile-picture" id="profilePicture">JD</div>
        <label for="pictureInput" class="picture-upload-label">
          <span class="upload-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
          </span>
        </label>
        <input type="file" id="pictureInput" class="picture-input" accept="image/*" style="display:none">
      </div>
      <p class="picture-hint">Click the camera to upload a new photo</p>
    </div>

    
    <div class="form-panel">

      <div class="form-panel-header">
        <div class="form-panel-header-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <span class="form-panel-title">Personal Information</span>
      </div>

      <div class="form-panel-body">

        <form class="profile-form" id="profileForm" novalidate>

          <p class="form-section-label">Name</p>

          <div class="form-row">
            <div class="form-group">
              <label for="firstName" class="form-label">First Name <span class="req">*</span></label>
              <input type="text" id="firstName" class="form-input" placeholder="Enter first name" autocomplete="given-name">
              <span class="error-message" id="firstNameError"></span>
            </div>
            <div class="form-group">
              <label for="lastName" class="form-label">Last Name <span class="req">*</span></label>
              <input type="text" id="lastName" class="form-input" placeholder="Enter last name" autocomplete="family-name">
              <span class="error-message" id="lastNameError"></span>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="middleName" class="form-label">Middle Name <span class="opt">(Optional)</span></label>
              <input type="text" id="middleName" class="form-input" placeholder="Enter middle name" autocomplete="additional-name">
              <span class="error-message" id="middleNameError"></span>
            </div>
          </div>

          <p class="form-section-label">Details</p>

          <div class="form-row">
            <div class="form-group">
              <label for="sex" class="form-label">Sex <span class="req">*</span></label>
              <select id="sex" class="form-input form-select">
                <option value="">Select sex</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
                <option value="prefer-not-to-say">Prefer not to say</option>
              </select>
              <span class="error-message" id="sexError"></span>
            </div>
            <div class="form-group">
              <label for="dateOfBirth" class="form-label">Date of Birth <span class="req">*</span></label>
              <input type="date" id="dateOfBirth" class="form-input" autocomplete="bday">
              <span class="error-message" id="dateOfBirthError"></span>
            </div>
          </div>

          <p class="form-section-label">Contact</p>

          <div class="form-row">
            <div class="form-group full-width">
              <label for="email" class="form-label">Email Address <span class="req">*</span></label>
              <input type="email" id="email" class="form-input" placeholder="Enter email address" autocomplete="email">
              <span class="error-message" id="emailError"></span>
            </div>
          </div>

          
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
            <button type="submit" class="btn btn-primary" id="saveBtn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              Save Changes
            </button>
          </div>

        </form>

        
        <div class="success-message" id="successMessage" style="display:none;">
          <span class="success-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
          </span>
          <span>Profile updated successfully!</span>
        </div>

      </div>
    </div>

  </div>
</div>

<script src="../scripts/profile.js"></script>

</body>
</html>
