<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookings</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/bookings.css">
</head>
<body>
<div class="app">

  <header class="header">
    <div class="header-left">
      <button class="back-btn" onclick="history.back()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5"/><path d="m12 19-7-7 7-7"/>
        </svg>
        Back
      </button>
      <h1>Bookings</h1>
      <div class="subtitle">Rental History</div>
    </div>
  </header>

  
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-label">Total</div>
      <div class="stat-value total" id="stat-total">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Active</div>
      <div class="stat-value confirmed" id="stat-active">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Pending</div>
      <div class="stat-value pending" id="stat-pending">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Rejected</div>
      <div class="stat-value cancelled" id="stat-rejected">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Total Spent</div>
      <div class="stat-value total" id="stat-revenue">₱0</div>
    </div>
  </div>

  
  <div class="controls">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" class="search-input" placeholder="Search vehicle, owner, renter…" id="searchInput">
    </div>
    <div class="filter-tabs">
      <button class="tab active" data-filter="all">All</button>
      <button class="tab" data-filter="pending">Pending</button>
      <button class="tab" data-filter="active">Active</button>
      <button class="tab" data-filter="return_requested">Return Req.</button>
      <button class="tab" data-filter="returned">Returned</button>
      <button class="tab" data-filter="rejected">Rejected</button>
    </div>
    <select class="sort-select" id="sortSelect">
      <option value="date-desc">Date ↓</option>
      <option value="date-asc">Date ↑</option>
      <option value="amount-desc">Amount ↓</option>
      <option value="amount-asc">Amount ↑</option>
      <option value="name-asc">Vehicle A–Z</option>
    </select>
  </div>

  
  <div class="table-wrap">
    <div class="table-header">
      <div class="th">ID</div>
      <div class="th">Renter</div>
      <div class="th">Vehicle / Owner</div>
      <div class="th">Dates</div>
      <div class="th right">Amount</div>
      <div class="th right">Status</div>
    </div>
    <div id="bookingsList"></div>
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">⊘</div>
      <h3>No bookings found</h3>
      <p>No rental records yet. Bookings will appear here once a renter submits a request.</p>
    </div>
  </div>

  <div class="footer">
    <div class="results-info" id="resultsInfo"></div>
    <div class="pagination" id="pagination"></div>
  </div>

</div>
<script src="bookings.js"></script>
</body>
</html>
