<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Log — CarRental</title>
  <link rel="stylesheet" href="../styles/email-log.css">
</head>
<body>
  <div class="email-log-header">
    <h1>Sent Email Notifications</h1>
    <button class="btn-clear-log" id="clearLogBtn">Clear Log</button>
  </div>
  <table class="email-table" id="emailTable">
    <thead>
      <tr>
        <th>Timestamp</th>
        <th>To</th>
        <th>Subject</th>
        <th>Body</th>
      </tr>
    </thead>
    <tbody id="emailTableBody">
      <!-- filled by script -->
    </tbody>
  </table>

  <script src="../scripts/email.js"></script>
  <script>
    function renderEmails() {
      const tbody = document.getElementById('emailTableBody');
      const messages = getSentEmails();
      tbody.innerHTML = messages.map(msg => {
        return `<tr>
          <td>${new Date(msg.timestamp).toLocaleString()}</td>
          <td>${msg.to}</td>
          <td>${msg.subject}</td>
          <td>${msg.body.replace(/\n/g,'<br>')}</td>
        </tr>`;
      }).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
      // mark as viewed so notification dot clears
      try { localStorage.setItem('emailLastViewed', new Date().toISOString()); } catch(e){}
      renderEmails();
      document.getElementById('clearLogBtn').addEventListener('click', () => {
        if (confirm('Clear all logged emails?')) {
          clearEmailLog();
          renderEmails();
        }
      });
    });
  </script>
</body>
</html>
