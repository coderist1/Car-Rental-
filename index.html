<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarRental</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
   
    <style>
        :root {
            --brand-color: #3F9B84;
            --brand-hover: #337d6a;
            --brand-light: #e6f3f0;
            --text-dark: #1a2e29;
            --text-muted: #5c756e;
            --bg-base: #f4f7f6;
            --white: #ffffff;
        }


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }


        body {
            background-color: var(--bg-base);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text-dark);
        }


        
        .decoration {
            position: absolute;
            z-index: -1;
            filter: blur(100px);
            border-radius: 50%;
            opacity: 0.4;
        }
        .shape-1 { width: 500px; height: 500px; background: var(--brand-color); top: -100px; left: -100px; }
        .shape-2 { width: 400px; height: 400px; background: #96ccbd; bottom: -100px; right: -100px; }


        .auth-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3.5rem 2.5rem;
            border-radius: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 30px 60px -12px rgba(63, 155, 132, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.6);
            text-align: center;
            animation: fadeIn 0.7s ease-out;
        }


        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }


        
        .brand-identity {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
        }


        .logo-box {
            background: var(--brand-color);
            width: 64px;
            height: 64px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            box-shadow: 0 12px 20px -5px rgba(63, 155, 132, 0.4);
        }


        .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .logo-text span { color: var(--brand-color); }


        
        h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem; }
        .subtitle { font-size: 0.95rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 2.5rem; }


        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }


        .btn {
            width: 100%;
            padding: 1.1rem;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
        }


        .btn-primary {
            background: var(--brand-color);
            color: white;
        }


        .btn-primary:hover {
            background: var(--brand-hover);
            transform: scale(1.02);
            box-shadow: 0 15px 20px -8px rgba(63, 155, 132, 0.3);
        }


        .btn-outline {
            background: var(--white);
            color: var(--text-dark);
            border: 1.5px solid #e2e8f0;
        }


        .btn-outline:hover {
            background: var(--brand-light);
            border-color: var(--brand-color);
            color: var(--brand-color);
        }


        .btn-admin {
            background: transparent;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-decoration: underline;
            text-underline-offset: 4px;
            margin-top: 1.5rem;
        }


        .btn-admin:hover {
            color: var(--brand-color);
        }


        
        .hidden { display: none; }
    </style>
</head>
<body>


    <div class="decoration shape-1"></div>
    <div class="decoration shape-2"></div>


    <main class="auth-card">
        <div class="brand-identity">
            <div class="logo-box">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/>
                    <circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/>
                </svg>
            </div>
            <div class="logo-text">Car<span>Rental</span></div>
        </div>


        <h1>Welcome</h1>
        <p class="subtitle">Find your perfect ride for your next big adventure.</p>


        <div class="button-group">
            <button class="btn btn-primary" onclick="navigateTo('pages/login.html')">
                Get Started
            </button>


            <button class="btn btn-outline" onclick="navigateTo('pages/register.html')" style="display: none;">
                Create Account
            </button>


            <button class="btn btn-admin" onclick="navigateTo('pages/admin-login.html')" style="display: none;">
                Admin Login
            </button>
        </div>
    </main>


    <script>
        function navigateTo(page) {
            window.location.href = page;
        }
    </script>
</body>
</html>
